<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zig + WebAssembly Showcase (Try)</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 2rem;
        max-width: 640px;
        line-height: 1.5;
      }
      .panel {
        border: 1px solid #d0d7de;
        border-radius: 8px;
        padding: 1rem;
        margin-bottom: 1rem;
      }
      button {
        margin-right: 0.5rem;
      }
    </style>
  </head>
  <body>
    <h1>Zig + WebAssembly (published try build)</h1>
    <p>This page is intended for static hosting (e.g. GitHub Pages).</p>

    <section class="panel">
      <h2>add(20, 22)</h2>
      <p>Result: <strong id="add-result">(loading)</strong></p>
    </section>

    <section class="panel">
      <h2>Counter state in WASM module</h2>
      <p>Current value: <strong id="counter">(loading)</strong></p>
      <button id="inc">Increment in WASM</button>
      <button id="reset">Reset in WASM</button>
    </section>

    <script type="module">
      const path = window.location.pathname;
      const appPath = path.endsWith("/")
        ? `${path}app.js`
        : path.endsWith("/index.html")
          ? path.replace(/index\.html$/, "app.js")
          : `${path}/app.js`;

      import(new URL(appPath, window.location.origin));
    </script>
  </body>
</html>
