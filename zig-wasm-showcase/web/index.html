<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zig + WebAssembly Showcase</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 2rem;
        max-width: 640px;
        line-height: 1.5;
      }
      .panel {
        border: 1px solid #d0d7de;
        border-radius: 8px;
        padding: 1rem;
        margin-bottom: 1rem;
      }
      button {
        margin-right: 0.5rem;
      }
      code {
        background: #f6f8fa;
        padding: 0.1rem 0.3rem;
      }
    </style>
  </head>
  <body>
    <h1>Zig + WebAssembly (minimal integration)</h1>
    <p>
      This demo calls exported Zig functions from JavaScript. Open the browser console for
      extra logs.
    </p>

    <section class="panel">
      <h2>add(20, 22)</h2>
      <p>Result: <strong id="add-result">(loading)</strong></p>
    </section>

    <section class="panel">
      <h2>Counter state in WASM module</h2>
      <p>Current value: <strong id="counter">(loading)</strong></p>
      <button id="inc">Increment in WASM</button>
      <button id="reset">Reset in WASM</button>
    </section>

    <script type="module" src="./app.js"></script>
  </body>
</html>
